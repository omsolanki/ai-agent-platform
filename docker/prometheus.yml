global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "agent-platform-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /api/v1/metrics

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
